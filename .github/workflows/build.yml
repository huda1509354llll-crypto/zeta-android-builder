name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-pip python3-dev git zip unzip openjdk-17-jdk libffi-dev libssl-dev zlib1g-dev cmake wget

      - name: Install Python deps
        run: pip install kivy buildozer cython

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -o cmdline-tools.zip
          mkdir -p latest
          rm -rf latest
          mv cmdline-tools latest
          yes | latest/bin/sdkmanager --licenses
          latest/bin/sdkmanager "platforms;android-33" "build-tools;37.0.0"
          ls -la $HOME/android-sdk/

      - name: Create buildozer.spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = ZetaApp' >> buildozer.spec
          echo 'package.name = zetaapp' >> buildozer.spec
          echo 'package.domain = org.zeta' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'version = 1.0.0' >> buildozer.spec
          echo 'requirements = python3,kivy' >> buildozer.spec
          echo 'orientation = portrait' >> buildozer.spec
          echo 'fullscreen = 1' >> buildozer.spec
          echo '' >> buildozer.spec
          echo '[buildozer]' >> buildozer.spec
          echo 'log_level = 2' >> buildozer.spec
          echo 'warn_on_root = 1' >> buildozer.spec
          cat buildozer.spec

      - name: Create main.py
        run: |
          echo 'from kivy.app import App' > main.py
          echo 'from kivy.uix.boxlayout import BoxLayout' >> main.py
          echo 'from kivy.uix.label import Label' >> main.py
          echo 'from kivy.uix.button import Button' >> main.py
          echo 'from kivy.core.window import Window' >> main.py
          echo '' >> main.py
          echo 'class ZetaApp(App):' >> main.py
          echo '    def build(self):' >> main.py
          echo '        Window.clearcolor = (0.1, 0.1, 0.2, 1)' >> main.py
          echo '        box = BoxLayout(orientation="vertical", padding=50, spacing=20)' >> main.py
          echo '        box.add_widget(Label(text="ZETA APP", font_size="32sp"))' >> main.py
          echo '        box.add_widget(Label(text="Python + Kivy", font_size="16sp"))' >> main.py
          echo '        btn = Button(text="Klik Saya!", font_size="18sp")' >> main.py
          echo '        btn.bind(on_press=self.hello)' >> main.py
          echo '        box.add_widget(btn)' >> main.py
          echo '        box.add_widget(Label(text="Ready!", font_size="14sp"))' >> main.py
          echo '        return box' >> main.py
          echo '    def hello(self, btn):' >> main.py
          echo '        print("Hello!")' >> main.py
          echo '' >> main.py
          echo 'if __name__ == "__main__":' >> main.py
          echo '    ZetaApp().run()' >> main.py
          cat main.py

      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeta-app.apk
          path: .buildozer/**/bin/*.apk
