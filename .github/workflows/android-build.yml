name: Build Android APK (Kivy)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            python3-pip \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Set up Java
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install kivy[full] buildozer cython

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p latest
          mv cmdline-tools/bin cmdline-tools/lib cmdline-tools/latest/ 2>/dev/null || true
          yes | latest/bin/sdkmanager --licenses > /dev/null 2>&1
          latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25b" "platform-tools" > /dev/null 2>&1

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$HOME/android-sdk/ndk/25b" >> $GITHUB_ENV

      - name: Create Buildozer Spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Zeta App
package.name = zetaapp
package.domain = org.zeta
source.dir = .
version = 1.0.0
requirements = python3,kivy==2.3.0
orientation = portrait
fullscreen = 1
android.permissions = INTERNET
android.allow_backup = True

[buildozer]
log_level = 2
warn_on_root = 1
build_dir = ./.buildozer
bin_dir = ./.buildozer/bin

[kdroid]
android_api = 33
ndk_api = 25
EOF

      - name: Create main.py
        run: |
          cat > main.py << 'EOF'
"""
Zeta App - Python Android Application
Built with Kivy + Buildozer
"""
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.label import Label
from kivy.uix.button import Button
from kivy.uix.textinput import TextInput
from kivy.core.window import Window

class ZetaApp(App):
    def build(self):
        Window.clearcolor = (0.1, 0.1, 0.2, 1)

        layout = BoxLayout(
            orientation='vertical',
            padding=50,
            spacing=20
        )

        # Title
        title = Label(
            text='[b]🚀 ZETA APP[/b]',
            markup=True,
            font_size='32sp',
            color=(0, 1, 0.5, 1),
            size_hint_y=0.2
        )

        # Description
        desc = Label(
            text='Aplikasi Android dengan Python + Kivy',
            font_size='16sp',
            color=(1, 1, 1, 1),
            size_hint_y=0.15
        )

        # Input
        self.input_field = TextInput(
            hint_text='Ketik sesuatu...',
            multiline=False,
            size_hint_y=0.15,
            font_size='16sp'
        )

        # Button
        button = Button(
            text='[b]Klik Saya![/b]',
            markup=True,
            background_color=(0, 0.7, 1, 1),
            font_size='18sp',
            size_hint_y=0.2
        )
        button.bind(on_press=self.on_button_press)

        # Output
        self.output = Label(
            text='Status: Siap ✅',
            font_size='14sp',
            color=(1, 1, 0, 1),
            size_hint_y=0.15
        )

        # Version
        version = Label(
            text='v1.0.0 | Built with Kivy + Buildozer',
            font_size='12sp',
            color=(0.5, 0.5, 0.5, 1),
            size_hint_y=0.15
        )

        layout.add_widget(title)
        layout.add_widget(desc)
        layout.add_widget(self.input_field)
        layout.add_widget(button)
        layout.add_widget(self.output)
        layout.add_widget(version)

        return layout

    def on_button_press(self, instance):
        text = self.input_field.text or "Tanpa text"
        self.output.text = f'✅ Berhasil! Text: {text}'

if __name__ == '__main__':
    ZetaApp().run()
EOF

      - name: Build debug APK
        run: |
          buildozer android debug --verbose 2>&1 || true
          # Find and list APK
          find . -name "*.apk" -type f 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeta-app-debug.apk
          path: |
            .buildozer/**/bin/*.apk
            src/**/*.apk
            *.apk
          retention-days: 7
          ignore-paths: |
            **/android/**/build/**
            **/buildozer/**/android/**

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            .buildozer/**/bin/*.apk
            *.apk
          name: Android Debug APK v${{ github.run_number }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
