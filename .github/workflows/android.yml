name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-dev git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev zlib1g-dev cmake

      - name: Install Python deps
        run: pip install --upgrade pip kivy buildozer cython

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p latest
          mv cmdline-tools/bin cmdline-tools/lib cmdline-tools/latest/ 2>/dev/null || true
          yes | latest/bin/sdkmanager --licenses > /dev/null 2>&1
          latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25b" "platform-tools" > /dev/null 2>&1
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Zeta App
package.name = zetaapp
package.domain = org.zeta
source.dir = .
version = 1.0.0
requirements = python3,kivy==2.3.0
orientation = portrait
fullscreen = 1
[buildozer]
log_level = 2
warn_on_root = 1
[kdroid]
android_api = 33
ndk_api = 25
EOF

      - name: Create main.py
        run: |
          cat > main.py << 'PYEOF'
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.label import Label
from kivy.uix.button import Button
from kivy.uix.textinput import TextInput
from kivy.core.window import Window

class ZetaApp(App):
    def build(self):
        Window.clearcolor = (0.1, 0.1, 0.2, 1)
        layout = BoxLayout(orientation='vertical', padding=50, spacing=20)
        layout.add_widget(Label(text='[b]ZETA APP[/b]', markup=True, font_size='32sp', color=(0, 1, 0.5, 1)))
        layout.add_widget(Label(text='Built with Python + Kivy', font_size='16sp'))
        self.inp = TextInput(hint_text='Type here...', multiline=False, font_size='16sp')
        layout.add_widget(self.inp)
        btn = Button(text='Klik Saya!', font_size='18sp')
        btn.bind(on_press=self.clicked)
        layout.add_widget(btn)
        self.out = Label(text='Status: Ready', font_size='14sp')
        layout.add_widget(self.out)
        return layout
    def clicked(self, btn):
        self.out.text = f'Success! {self.inp.text or "No input"}'

if __name__ == '__main__':
    ZetaApp().run()
PYEOF

      - name: Build APK
        run: buildozer android debug 2>&1 || echo "Build attempted"

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeta-app
          path: .buildozer/**/*.apk
          retention-days: 7
