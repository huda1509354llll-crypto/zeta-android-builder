name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-pip python3-dev git zip unzip openjdk-17-jdk libffi-dev libssl-dev zlib1g-dev cmake wget

      - name: Install Python deps
        run: pip install kivy buildozer cython

      - name: Accept Android SDK licenses
        run: |
          mkdir -p /home/runner/.android/licenses
          touch /home/runner/.android/repositories.cfg
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd975f751698a77b662f1254ddbeed3901e976f5a" > /home/runner/.android/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > /home/runner/.android/licenses/android-sdk-preview-license
          cat /home/runner/.android/licenses/android-sdk-license

      - name: Create buildozer.spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = ZetaApp' >> buildozer.spec
          echo 'package.name = zetaapp' >> buildozer.spec
          echo 'package.domain = org.zeta' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'version = 1.0.0' >> buildozer.spec
          echo 'requirements = python3,kivy' >> buildozer.spec
          echo 'orientation = portrait' >> buildozer.spec
          echo 'fullscreen = 1' >> buildozer.spec
          cat buildozer.spec

      - name: Create main.py
        run: |
          cat > main.py << 'PYEOF'
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.label import Label
from kivy.uix.button import Button
from kivy.core.window import Window

class ZetaApp(App):
    def build(self):
        Window.clearcolor = (0.1, 0.1, 0.2, 1)
        box = BoxLayout(orientation='vertical', padding=50, spacing=20)
        box.add_widget(Label(text='ZETA APP', font_size='32sp'))
        box.add_widget(Label(text='Python + Kivy', font_size='16sp'))
        btn = Button(text='Klik Saya!', font_size='18sp')
        btn.bind(on_press=self.hello)
        box.add_widget(btn)
        box.add_widget(Label(text='Ready!', font_size='14sp'))
        return box
    def hello(self, btn):
        print("Hello!")

if __name__ == '__main__':
    ZetaApp().run()
PYEOF

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeta-app.apk
          path: .buildozer/**/bin/*.apk
