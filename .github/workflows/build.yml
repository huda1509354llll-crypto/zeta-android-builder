name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-dev git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev zlib1g-dev cmake wget

      - name: Install Python packages
        run: pip install kivy buildozer cython

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/bin cmdline-tools/lib cmdline-tools/NOTICE.txt cmdline-tools/source.properties cmdline-tools/latest/ 2>/dev/null || true
          yes | cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25b" > /dev/null 2>&1
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'SPEC'
[app]
title = ZetaApp
package.name = zetaapp
package.domain = org.zeta
source.dir = .
version = 1.0.0
requirements = python3,kivy
orientation = portrait
fullscreen = 1
[buildozer]
log_level = 2
warn_on_root = 1
[kdroid]
android_api = 33
ndk_api = 25
SPEC

      - name: Create main.py
        run: |
          cat > main.py << 'APP'
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.label import Label
from kivy.uix.button import Button
from kivy.core.window import Window

class ZetaApp(App):
    def build(self):
        Window.clearcolor = (0.1, 0.1, 0.2, 1)
        box = BoxLayout(orientation='vertical', padding=50, spacing=20)
        box.add_widget(Label(text='[b]ZETA APP[/b]', markup=True, font_size='32sp', color=(0, 1, 0.5, 1)))
        box.add_widget(Label(text='Python + Kivy', font_size='16sp'))
        btn = Button(text='Klik Saya!', font_size='18sp')
        btn.bind(on_press=self.hello)
        box.add_widget(btn)
        box.add_widget(Label(text='Ready!', font_size='14sp'))
        return box

    def hello(self, btn):
        print('Hello from ZetaApp!')

if __name__ == '__main__':
    ZetaApp().run()
APP

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeta-app.apk
          path: .buildozer/**/bin/*.apk
