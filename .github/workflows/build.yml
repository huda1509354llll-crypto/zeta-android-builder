name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y openjdk-17-jdk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api: 33

      - name: Install Python deps
        run: pip install kivy buildozer cython

      - name: Build APK
        env:
          ANDROID_HOME: /opt/android-sdk
        run: |
          mkdir -p /opt/android-sdk/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > /opt/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > /opt/android-sdk/licenses/android-sdk-preview-license
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          echo "Kivy App" > main.py
          echo "[app]" > buildozer.spec
          echo "title = ZetaApp" >> buildozer.spec
          echo "package.name = zetaapp" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "version = 1.0.0" >> buildozer.spec
          echo "requirements = python3,kivy" >> buildozer.spec
          echo "orientation = portrait" >> buildozer.spec
          printf '\nfrom kivy.app import App\nfrom kivy.uix.boxlayout import BoxLayout\nfrom kivy.uix.label import Label\nfrom kivy.uix.button import Button\n\nclass ZetaApp(App):\n    def build(self):\n        box = BoxLayout(orientation="vertical", padding=20)\n        box.add_widget(Label(text="ZETA APP"))\n        btn = Button(text="Klik Saya!")\n        btn.bind(on_press=lambda x: None)\n        box.add_widget(btn)\n        return box\n\nif __name__ == "__main__":\n    ZetaApp().run()\n' > main.py
          buildozer android debug
          find . -name "*.apk" -type f

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zeta-apk
          path: .buildozer/**/*.apk
