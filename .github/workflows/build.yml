name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y python3-pip git openjdk-17-jdk

      - name: Install Python deps
        run: pip install kivy buildozer cython

      - name: Setup Android SDK with licenses
        uses: android-actions/setup-android@v3
        with:
          api: 33
          tools: true

      - name: Create buildozer.spec
        run: |
          printf '%s\n' '[app]' 'title = ZetaApp' 'package.name = zetaapp' 'package.domain = org.zeta' 'source.dir = .' 'version = 1.0.0' 'requirements = python3,kivy' 'orientation = portrait' 'fullscreen = 1' > buildozer.spec

      - name: Create main.py
        run: |
          printf '%s\n' 'from kivy.app import App' 'from kivy.uix.boxlayout import BoxLayout' 'from kivy.uix.label import Label' 'from kivy.uix.button import Button' 'from kivy.core.window import Window' '' 'class ZetaApp(App):' '    def build(self):' '        Window.clearcolor = (0.1, 0.1, 0.2, 1)' '        box = BoxLayout(orientation="vertical", padding=50, spacing=20)' '        box.add_widget(Label(text="ZETA APP", font_size="32sp"))' '        box.add_widget(Label(text="Python + Kivy", font_size="16sp"))' '        btn = Button(text="Klik Saya!", font_size="18sp")' '        btn.bind(on_press=self.hello)' '        box.add_widget(btn)' '        box.add_widget(Label(text="Ready!", font_size="14sp"))' '        return box' '    def hello(self, btn):' '        print("Hello!")' '' 'if __name__ == "__main__":' '    ZetaApp().run()' > main.py

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeta-app
          path: .buildozer/**/*.apk
