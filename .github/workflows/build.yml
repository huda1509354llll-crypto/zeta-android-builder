name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-dev git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev zlib1g-dev cmake wget

      - name: Install Python deps
        run: pip install kivy buildozer cython

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/bin cmdline-tools/lib cmdline-tools/NOTICE.txt cmdline-tools/source.properties cmdline-tools/latest/ 2>/dev/null
          yes | cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25b" > /dev/null 2>&1
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Create buildozer.spec
        run: |
          printf '[app]\ntitle = ZetaApp\npackage.name = zetaapp\npackage.domain = org.zeta\nsource.dir = .\nversion = 1.0.0\nrequirements = python3,kivy\norientation = portrait\nfullscreen = 1\n\n[buildozer]\nlog_level = 2\nwarn_on_root = 1\n\n[kdroid]\nandroid_api = 33\nndk_api = 25\n' > buildozer.spec
          cat buildozer.spec

      - name: Create main.py
        run: |
          printf 'from kivy.app import App\nfrom kivy.uix.boxlayout import BoxLayout\nfrom kivy.uix.label import Label\nfrom kivy.uix.button import Button\nfrom kivy.core.window import Window\n\nclass ZetaApp(App):\n    def build(self):\n        Window.clearcolor = (0.1, 0.1, 0.2, 1)\n        box = BoxLayout(orientation="vertical", padding=50, spacing=20)\n        box.add_widget(Label(text="ZETA APP", font_size="32sp"))\n        box.add_widget(Label(text="Python + Kivy", font_size="16sp"))\n        btn = Button(text="Klik Saya!", font_size="18sp")\n        btn.bind(on_press=self.hello)\n        box.add_widget(btn)\n        box.add_widget(Label(text="Ready!", font_size="14sp"))\n        return box\n    def hello(self, btn):\n        print("Hello!")\n\nif __name__ == "__main__":\n    ZetaApp().run()\n' > main.py
          cat main.py

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeta-app.apk
          path: .buildozer/**/bin/*.apk
